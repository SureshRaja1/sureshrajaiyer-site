<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#b8860b" stroke-width="2" opacity="0.4"/>

  <!-- Spinning vinyl groove rings -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="100" r="58" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Equalizer bars (centered) -->
  <rect x="64" y="82" width="8" height="36" rx="4" fill="#b8860b" opacity="0.9"/>
  <rect x="78" y="72" width="8" height="56" rx="4" fill="#b8860b"/>
  <rect x="92" y="64" width="8" height="72" rx="4" fill="#d4a017"/>
  <rect x="106" y="76" width="8" height="48" rx="4" fill="#b8860b"/>
  <rect x="120" y="86" width="8" height="28" rx="4" fill="#b8860b" opacity="0.9"/>

  <!-- Center label -->
  <circle cx="100" cy="100" r="20" fill="#b8860b"/>
  <circle cx="100" cy="100" r="4" fill="#1a1a1a"/>

  <!-- Text -->
  <text x="100" y="174" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#b8860b" letter-spacing="2">AUDIOSPINNER</text>
</svg>
